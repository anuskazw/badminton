<!DOCTYPE html>
<html>
  <head>
    <meta charset="utf-8" />
    <title>Liga de Bádminton</title>
    <script>
      // Redirige rutas desconocidas a index.html preservando la ruta en la query string
      // https://github.com/rafgraph/spa-github-pages
      var l = window.location;
      l.replace(
        l.protocol + '//' + l.host + '/' +
        l.pathname.split('/').slice(0, 2).join('/') + '/' +
        '?/' +
        l.pathname.slice(1).split('/').slice(1).join('/').replace(/&/g, '~and~') +
        (l.search ? '&' + l.search.slice(1).replace(/&/g, '~and~') : '') +
        l.hash
      );
    </script>
  </head>
  <body></body>
</html>
